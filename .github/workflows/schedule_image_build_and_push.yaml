# This is a docker build check and publish job:
# 1. PR Triggered docker image build check
#   - 'image-build' label should be added
#   - is for image build check
#   - Enable on main/releases branch
#   - push: ${{ github.event_name != 'pull_request' }} ==> false
# 2. branches push trigger image publish
#   - is for branch/dev/nightly image
#   - commits are merge into main/*-dev  ==> vllm-ascend:main / vllm-ascend:*-dev
# 3. tags push trigger image publish
#   - is for final release image
#   - Publish when tag with v* (pep440 version)  ===>  vllm-ascend:v1.2.3 / vllm-ascend:v1.2.3rc1
name: Image Build and Push
on:
  push:
    tags:
      - 'v*'
  pull_request: 
    branches:
      - 'main'
      - 'releases/*'
    types: [ labeled ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag for build results (mutually exclusive with branch)'
        default: "none"
        required: false
        type: choice
        options:
          - main
          - v0.23.0rc1
          - v0.22.1rc1
          - v0.21.0rc1
          - v0.20.2rc1
          - none
      branch:
        description: 'Docker branch for build results (mutually exclusive with tag)'
        default: "none"
        required: false
        type: choice
        options:
          - main
          - releases/v0.23.0
          - releases/v0.22.1rc
          - releases/v0.21.0rc
          - releases/v0.20.2rc
          - releases/v0.18.0
          - none
      vllm_commit:
        description: 'vLLM commit hash (must be paired with vllm_ascend_commit; mutually exclusive with tag/branch). Image will be pushed only to QUAY_TEMP_USERNAME.'
        required: false
        default: ''
        type: string
      vllm_ascend_commit:
        description: 'vllm-ascend commit hash (must be paired with vllm_commit; mutually exclusive with tag/branch). Image will be pushed only to QUAY_TEMP_USERNAME.'
        required: false
        default: ''
        type: string
      build_type:
        description: 'Build type (release/daily)'
        required: false
        default: 'release'
        type: string
      memcache_version:
        description: 'Memcache version'
        required: false
        default: '1.2.0'
        type: string
      memcache_date:
        description: 'Memcache date'
        required: false
        default: '20260716.5'
        type: string
      memfabric_version:
        description: 'Memfabric version'
        required: false
        default: '1.2.0'
        type: string
      memfabric_date:
        description: 'Memfabric date'
        required: false
        default: '20260716.8'
        type: string
      torch_npu_version:
        description: 'Torch NPU version'
        required: false
        default: '26.1.0'
        type: string
      torch_npu_date:
        description: 'Torch NPU date'
        required: false
        default: '20260715.4'
        type: string
      cann_quay_url:
        description: 'CANN Quay URL'
        required: false
        default: 'quay.io/canuunac/cann'
        type: string
      cann_version:
        description: 'CANN version'
        required: false
        default: '9.1.0.B090'
        type: string
      triton_ascend_version:
        description: 'Triton Ascend version'
        required: false
        default: '26.1.0.B110'
        type: string
      triton_ascend_package_version:
        description: 'Triton Ascend package version'
        required: false
        default: '3.2.2'
        type: string

permissions:
  packages: write
  contents: read

jobs:
  image_build:
    name: Image Build and Push
    if: ${{ !((github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'image-build')))
        && !(github.event_name == 'workflow_dispatch' && inputs.vllm_commit != '' && inputs.vllm_ascend_commit != '') }}
    strategy:
      matrix:
        build_meta:
          - name: A2 Ubuntu
            dockerfile: Dockerfile
            suffix: ''
          - name: A2 openeuler
            dockerfile: Dockerfile.openEuler
            suffix: 'openeuler'
          - name: A3 Ubuntu
            dockerfile: Dockerfile.a3
            suffix: 'a3'
          - name: A3 openEuler
            dockerfile: Dockerfile.a3.openEuler
            suffix: 'a3-openeuler'
          - name: 310P Ubuntu
            dockerfile: Dockerfile.310p
            suffix: '310p'
          - name: 310P openEuler
            dockerfile: Dockerfile.310p.openEuler
            suffix: '310p-openeuler'
          - name: A5 Ubuntu
            dockerfile: Dockerfile.a5
            suffix: 'a5'
          - name: A5 openEuler
            dockerfile: Dockerfile.a5.openEuler
            suffix: 'a5-openeuler'
    uses: ./.github/workflows/_schedule_image_build.yaml
    with:
      dockerfile: ${{ matrix.build_meta.dockerfile }}
      suffix: ${{ matrix.build_meta.suffix }}
      quay_username: ${{ vars.QUAY_USERNAME }}
      quay_temp_username: ${{ vars.QUAY_TEMP_USERNAME }}
      should_push: ${{ github.repository_owner == 'du-ping1' && (github.event_name != 'pull_request') }}
      workflow_dispatch_tag: ${{ inputs.tag != 'none' && inputs.tag || '' }}
      branch_ref: ${{ inputs.branch != 'none' && inputs.branch || '' }}
      build_args: |
        BUILD_TYPE=${{ inputs.build_type || 'release' }}
        MEMCACHE_VERSION=${{ inputs.memcache_version || '1.2.0' }}
        MEMCACHE_DATE=${{ inputs.memcache_date || '20260716.5' }}
        MEMFABRIC_VERSION=${{ inputs.memfabric_version || '1.2.0' }}
        MEMFABRIC_DATE=${{ inputs.memfabric_date || '20260716.8' }}
        TORCH_NPU_VERSION=${{ inputs.torch_npu_version || '26.1.0' }}
        TORCH_NPU_DATE=${{ inputs.torch_npu_date || '20260715.4' }}
        CANN_QUAY_URL=${{ inputs.cann_quay_url || 'quay.io/canuunac/cann' }}
        CANN_VERSION=${{ inputs.cann_version || '9.1.0.B090' }}
        TRITON_ASCEND_VERSION=${{ inputs.triton_ascend_version || '26.1.0.B110' }}
        TRITON_ASCEND_PACKAGE_VERSION=${{ inputs.triton_ascend_package_version || '3.2.2' }}
    secrets:
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      QUAY_TEMP_PASSWORD: ${{ secrets.QUAY_TEMP_PASSWORD }}

  image_build_by_commit:
    name: Image Build (commit mode) and Push to QUAY_TEMP
    if: ${{ github.event_name == 'workflow_dispatch'
        && inputs.vllm_commit != ''
        && inputs.vllm_ascend_commit != ''
        && inputs.tag == 'none'
        && inputs.branch == 'none' }}
    strategy:
      matrix:
        build_meta:
          - name: A2 Ubuntu
            dockerfile: Dockerfile
            suffix: ''
          - name: A2 openeuler
            dockerfile: Dockerfile.openEuler
            suffix: 'openeuler'
          - name: A3 Ubuntu
            dockerfile: Dockerfile.a3
            suffix: 'a3'
          - name: A3 openEuler
            dockerfile: Dockerfile.a3.openEuler
            suffix: 'a3-openeuler'
          - name: 310P Ubuntu
            dockerfile: Dockerfile.310p
            suffix: '310p'
          - name: 310P openEuler
            dockerfile: Dockerfile.310p.openEuler
            suffix: '310p-openeuler'
          - name: A5 Ubuntu
            dockerfile: Dockerfile.a5
            suffix: 'a5'
          - name: A5 openEuler
            dockerfile: Dockerfile.a5.openEuler
            suffix: 'a5-openeuler'
    uses: ./.github/workflows/_schedule_image_build.yaml
    with:
      dockerfile: ${{ matrix.build_meta.dockerfile }}
      suffix: ${{ matrix.build_meta.suffix }}
      quay_temp_username: ${{ vars.QUAY_TEMP_USERNAME }}
      # Commit mode always pushes (to QUAY_TEMP_REPO only) and never promotes
      # the image to QUAY_REPO via merge-image, so quay_username is intentionally omitted.
      should_push: true
      temp_only: true
      vllm_commit: ${{ inputs.vllm_commit }}
      vllm_ascend_commit: ${{ inputs.vllm_ascend_commit }}
      workflow_dispatch_tag: ''
      branch_ref: ''
      build_args: |
        BUILD_TYPE=${{ inputs.build_type || 'release' }}
        MEMCACHE_VERSION=${{ inputs.memcache_version || '1.2.0' }}
        MEMCACHE_DATE=${{ inputs.memcache_date || '20260716.5' }}
        MEMFABRIC_VERSION=${{ inputs.memfabric_version || '1.2.0' }}
        MEMFABRIC_DATE=${{ inputs.memfabric_date || '20260716.8' }}
        TORCH_NPU_VERSION=${{ inputs.torch_npu_version || '26.1.0' }}
        TORCH_NPU_DATE=${{ inputs.torch_npu_date || '20260715.4' }}
        CANN_QUAY_URL=${{ inputs.cann_quay_url || 'quay.io/canuunac/cann' }}
        CANN_VERSION=${{ inputs.cann_version || '9.1.0.B090' }}
        TRITON_ASCEND_VERSION=${{ inputs.triton_ascend_version || '26.1.0.B110' }}
        TRITON_ASCEND_PACKAGE_VERSION=${{ inputs.triton_ascend_package_version || '3.2.2' }}
    secrets:
      QUAY_TEMP_PASSWORD: ${{ secrets.QUAY_TEMP_PASSWORD }}